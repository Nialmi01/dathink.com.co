<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Dathink | Automatización de Procesos e Inteligencia Artificial para Empresas en Colombia</title>
    <meta name="description" content="Dathink ayuda a PYMEs colombianas a reducir costos y crecer con automatización de procesos, bots de WhatsApp, agentes de IA y software a medida." />
    <meta name="keywords" content="automatización de procesos Colombia, inteligencia artificial para empresas, bots WhatsApp empresas, software a medida Colombia, automatización empresarial Medellín, agentes IA, transformación digital PYME" />
    <meta name="author" content="Dathink" />
    <link rel="canonical" href="https://www.dathink.com.co/" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.dathink.com.co/" />
    <meta property="og:title" content="Dathink | Automatización e IA para Empresas en Colombia" />
    <meta property="og:description" content="Reduce costos y automatiza tus procesos con inteligencia artificial. Chatbots, software a medida y estrategias digitales para PYMEs colombianas." />
    <meta property="og:image" content="https://www.dathink.com.co/logo.jpg" />
    <meta property="og:locale" content="es_CO" />
    <meta property="og:site_name" content="Dathink" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dathink | Automatización e IA para Empresas" />
    <meta name="twitter:description" content="Automatiza procesos, implementa IA y transforma tu empresa digitalmente con Dathink." />
    <meta name="twitter:image" content="https://www.dathink.com.co/logo.jpg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Structured Data: Organization -->
    <script id="organization-schema" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Dathink",
      "url": "https://www.dathink.com.co",
      "logo": "https://www.dathink.com.co/logo.jpg",
      "description": "Empresa colombiana especializada en automatización de procesos, inteligencia artificial, software a medida y transformación digital para PYMEs.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "CO",
        "addressRegion": "Antioquia",
        "addressLocality": "Medellín"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+57-315-122-1814",
        "contactType": "customer service",
        "availableLanguage": "Spanish"
      },
      "sameAs": [
        "https://www.linkedin.com/company/dathink",
        "https://www.instagram.com/dathink_sas_col"
      ],
      "serviceArea": {
        "@type": "Country",
        "name": "Colombia"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Servicios de Tecnología y Automatización",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Automatización de Procesos con IA" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Bots de WhatsApp para Empresas" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Software a Medida" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Análisis de Datos y Business Intelligence" } }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
